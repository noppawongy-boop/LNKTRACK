<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ตรวจสอบพัสดุ</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #637083;
      --line: #d9e0e8;
      --soft: #f4f7f9;
      --paper: #ffffff;
      --primary: #0f766e;
      --primary-dark: #0b5f59;
      --accent: #bf3b2f;
      --focus: #f4b740;
      --shadow: 0 20px 55px rgba(24, 39, 56, .14);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15, 118, 110, .12), rgba(191, 59, 47, .08)),
        var(--soft);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(300px, .7fr);
      gap: 24px;
      align-items: start;
    }

    .panel,
    .result {
      background: var(--paper);
      border: 1px solid rgba(23, 32, 42, .08);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .mark {
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      color: #fff;
      background: var(--primary);
      border-radius: 8px;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    form {
      display: grid;
      gap: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #2d3748;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      letter-spacing: 0;
      outline: none;
    }

    input:focus,
    select:focus,
    button:focus-visible,
    a:focus-visible {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(244, 183, 64, .32);
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    button,
    .btn {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 16px;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border .15s ease;
    }

    button:hover,
    .btn:hover {
      transform: translateY(-1px);
    }

    .primary {
      color: #fff;
      background: var(--primary);
    }

    .primary:hover {
      background: var(--primary-dark);
    }

    .secondary {
      color: var(--ink);
      background: #fff;
      border-color: var(--line);
    }

    .secondary:hover {
      border-color: var(--primary);
    }

    .status {
      min-height: 24px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
    }

    .result {
      overflow: hidden;
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .result-head h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .count {
      min-width: 32px;
      border-radius: 999px;
      padding: 4px 10px;
      color: #fff;
      background: var(--primary);
      text-align: center;
      font-size: 13px;
      font-weight: 800;
    }

    .links {
      display: grid;
      padding: 10px;
      gap: 8px;
    }

    .carrier {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 62px;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
    }

    .carrier:hover {
      border-color: var(--line);
      background: #f7fafc;
    }

    .logo {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 0;
    }

    .carrier strong,
    .carrier span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .carrier strong {
      font-size: 15px;
    }

    .carrier span {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .open {
      color: var(--primary);
      font-size: 13px;
      font-weight: 900;
    }

    .note {
      margin-top: 18px;
      padding: 14px;
      border-left: 4px solid var(--focus);
      color: var(--muted);
      background: #fff9ea;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.55;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 22px, 680px);
        padding: 18px 0;
      }

      .shell,
      .row {
        grid-template-columns: 1fr;
      }

      .panel {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="shell">
      <section class="panel" aria-labelledby="page-title">
        <div class="brand">
          <div class="mark" aria-hidden="true">TH</div>
          <div>
            <h1 id="page-title">ตรวจสอบพัสดุ</h1>
            <p class="sub">ใส่เลข Tracking ครั้งเดียว แล้วเปิดลิงก์ติดตามของขนส่งที่ต้องการได้ทันที</p>
          </div>
        </div>

        <form id="trackingForm">
          <div class="row">
            <div>
              <label for="trackingNumber">เลข Tracking</label>
              <input id="trackingNumber" name="trackingNumber" autocomplete="off" placeholder="เช่น TH1234567890 หรือ EE123456789TH" required>
            </div>
            <div>
              <label for="carrierSelect">ขนส่ง</label>
              <select id="carrierSelect" name="carrierSelect"></select>
            </div>
          </div>

          <div class="actions">
            <button class="primary" type="submit">เปิดตรวจสอบ</button>
            <button class="secondary" id="copyBtn" type="button">คัดลอกเลข</button>
            <button class="secondary" id="clearBtn" type="button">ล้างข้อมูล</button>
          </div>
          <div class="status" id="status" role="status" aria-live="polite"></div>
        </form>

        <div class="note">
          บางเว็บไซต์ของขนส่งอาจเปลี่ยนหน้าติดตามหรือบล็อกการเปิดจากลิงก์ตรง หากเปิดแล้วไม่แสดงผล ให้ใช้เลขที่คัดลอกไว้ค้นหาในช่องของเว็บขนส่งนั้นได้เลย
        </div>
      </section>

      <aside class="result" aria-labelledby="link-title">
        <div class="result-head">
          <h2 id="link-title">ลิงก์ติดตาม</h2>
          <span class="count" id="linkCount">0</span>
        </div>
        <div class="links" id="linkList"></div>
      </aside>
    </div>
  </main>

  <script>
    const carriers = [
      {
        id: "thailand-post",
        name: "Thailand Post",
        label: "ไปรษณีย์ไทย",
        short: "TP",
        color: "#d71920",
        url: n => `https://track.thailandpost.co.th/?trackNumber=${n}`
      },
      {
        id: "kex",
        name: "KEX Express",
        label: "Kerry / KEX",
        short: "KX",
        color: "#f37021",
        url: n => `https://th.kex-express.com/th/track/?track=${n}`
      },
      {
        id: "flash",
        name: "Flash Express",
        label: "Flash Express",
        short: "FL",
        color: "#f6b100",
        url: n => `https://www.flashexpress.co.th/tracking/?se=${n}`
      },
      {
        id: "jt",
        name: "J&T Express",
        label: "J&T Express",
        short: "JT",
        color: "#d71920",
        url: n => `https://www.jtexpress.co.th/index/query/gzquery.html?bills=${n}`
      },
      {
        id: "ninja",
        name: "Ninja Van",
        label: "Ninja Van",
        short: "NV",
        color: "#ef4d2d",
        url: n => `https://www.ninjavan.co/th-th/tracking?id=${n}`
      },
      {
        id: "best",
        name: "BEST Express",
        label: "BEST Express",
        short: "BE",
        color: "#1262a3",
        url: n => `https://www.best-inc.co.th/track?bills=${n}`
      },
      {
        id: "dhl",
        name: "DHL Express",
        label: "DHL Express",
        short: "DH",
        color: "#ffcc00",
        url: n => `https://www.dhl.com/th-en/home/tracking/tracking-express.html?submit=1&tracking-id=${n}`
      },
      {
        id: "fedex",
        name: "FedEx",
        label: "FedEx",
        short: "FX",
        color: "#4d148c",
        url: n => `https://www.fedex.com/fedextrack/?trknbr=${n}`
      },
      {
        id: "ups",
        name: "UPS",
        label: "UPS",
        short: "UP",
        color: "#351c15",
        url: n => `https://www.ups.com/track?tracknum=${n}`
      },
      {
        id: "spx",
        name: "SPX Express",
        label: "Shopee Express / SPX",
        short: "SX",
        color: "#ee4d2d",
        direct: false,
        url: () => "https://spx.co.th/th"
      },
      {
        id: "scg",
        name: "SCG Express",
        label: "SCG Express",
        short: "SC",
        color: "#d71920",
        direct: false,
        url: () => "https://www.scgexpress.co.th/tracking/"
      },
      {
        id: "iel",
        name: "Inter Express Logistics",
        label: "Inter Express",
        short: "IE",
        color: "#008c95",
        direct: false,
        url: () => "https://tracking.iel.co.th/"
      },
      {
        id: "dhl-ecommerce",
        name: "DHL eCommerce",
        label: "DHL eCommerce",
        short: "DE",
        color: "#ffcc00",
        url: n => `https://www.dhl.com/th-en/home/tracking/tracking-ecommerce.html?tracking-id=${n}`
      },
      {
        id: "lex",
        name: "Lazada Express",
        label: "Lazada / LEX",
        short: "LX",
        color: "#1a4db3",
        direct: false,
        url: () => "https://tracker.lel.asia/"
      },
      {
        id: "cj",
        name: "CJ Logistics",
        label: "CJ Logistics",
        short: "CJ",
        color: "#006ecd",
        url: n => `https://www.cjlogistics.com/en/tool/parcel/tracking?gnbInvcNo=${n}`
      },
      {
        id: "central-express",
        name: "Central Express",
        label: "Central Express",
        short: "CE",
        color: "#111827",
        direct: false,
        url: () => "https://www.google.com/search?q=Central+Express+tracking"
      }
    ];

    const trackingInput = document.querySelector("#trackingNumber");
    const carrierSelect = document.querySelector("#carrierSelect");
    const linkList = document.querySelector("#linkList");
    const linkCount = document.querySelector("#linkCount");
    const status = document.querySelector("#status");
    const copyBtn = document.querySelector("#copyBtn");
    const clearBtn = document.querySelector("#clearBtn");

    function cleanTracking(value) {
      return value.trim().replace(/[\s\-_.]+/g, "");
    }

    function selectedCarriers() {
      if (carrierSelect.value === "auto") {
        const detected = detectCarrier(cleanTracking(trackingInput.value));
        return detected ? [detected] : carriers;
      }

      if (carrierSelect.value === "all") return carriers;
      return carriers.filter(carrier => carrier.id === carrierSelect.value);
    }

    function buildUrl(carrier, tracking) {
      return carrier.url(encodeURIComponent(tracking));
    }

    function detectCarrier(tracking) {
      const code = tracking.toUpperCase();

      if (!code) return null;
      if (/^1Z[A-Z0-9]{16}$/.test(code)) return carrierById("ups");
      if (/^[A-Z]{2}\d{9}TH$/.test(code)) return carrierById("thailand-post");
      if (/^(SPX|SPE|SPXTN|THSHP|THSPX)[A-Z0-9]{6,}$/.test(code)) return carrierById("spx");
      if (/^TH[A-Z0-9]{10,}$/.test(code)) return carrierById("spx");
      if (/^(CE|CEN|CENTRAL)[A-Z0-9]{6,}$/.test(code)) return carrierById("central-express");
      if (/^(GM|LX|RX|CN|HK|SG|MY)[A-Z0-9]{8,}$/.test(code) && code.length >= 12) return carrierById("dhl-ecommerce");
      if (/^(JJD|JD|JVGL|JVG|3S)[A-Z0-9]{7,}$/.test(code)) return carrierById("dhl");
      if (/^\d{10,11}$/.test(code)) return carrierById("dhl");
      if (/^\d{12,15}$/.test(code)) return carrierById("fedex");

      return null;
    }

    function carrierById(id) {
      return carriers.find(carrier => carrier.id === id);
    }

    function submitCarrier(tracking) {
      if (carrierSelect.value === "auto" || carrierSelect.value === "all") {
        return detectCarrier(tracking);
      }

      return selectedCarriers()[0];
    }

    function renderLinks() {
      const tracking = cleanTracking(trackingInput.value);
      const list = selectedCarriers();
      const detected = carrierSelect.value === "auto" ? detectCarrier(tracking) : null;

      linkList.innerHTML = "";
      linkCount.textContent = list.length;

      if (carrierSelect.value === "auto" && tracking) {
        showStatus(detected
          ? `ตรวจพบอัตโนมัติ: ${detected.label}`
          : "ยังตรวจอัตโนมัติไม่ได้ กรุณาเลือกขนส่งเองหรือกดลิงก์จากรายการ", Boolean(detected));
      }

      list.forEach(carrier => {
        const href = tracking ? buildUrl(carrier, tracking) : "#";
        const link = document.createElement("a");
        link.className = "carrier";
        link.href = href;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.dataset.carrier = carrier.id;
        link.innerHTML = `
          <span class="logo" style="background:${carrier.color}">${carrier.short}</span>
          <span>
            <strong>${carrier.name}</strong>
            <span>${carrier.label}</span>
          </span>
          <span class="open">${carrier.direct === false ? "คัดลอก+เปิด" : "เปิด"}</span>
        `;
        link.addEventListener("click", event => {
          if (!tracking) {
            event.preventDefault();
            showStatus("กรุณาใส่เลข Tracking ก่อนเปิดลิงก์");
            trackingInput.focus();
            return;
          }

          if (carrier.direct === false) {
            navigator.clipboard.writeText(tracking).catch(() => {});
            showStatus(`คัดลอกเลข Tracking แล้ว และเปิดหน้า ${carrier.label}`, true);
          }
        });
        linkList.appendChild(link);
      });
    }

    function showStatus(message, ok = false) {
      status.textContent = message;
      status.style.color = ok ? "var(--primary)" : "var(--accent)";
    }

    function populateSelect() {
      carrierSelect.innerHTML = '<option value="auto">ตรวจอัตโนมัติ</option><option value="all">ทุกขนส่ง</option>' + carriers
        .map(carrier => `<option value="${carrier.id}">${carrier.label}</option>`)
        .join("");
    }

    document.querySelector("#trackingForm").addEventListener("submit", event => {
      event.preventDefault();
      const tracking = cleanTracking(trackingInput.value);

      if (!tracking) {
        showStatus("กรุณาใส่เลข Tracking");
        trackingInput.focus();
        return;
      }

      const target = submitCarrier(tracking);

      if (!target) {
        showStatus("ยังระบุขนส่งจากเลขนี้ไม่ได้ กรุณาเลือกขนส่งจาก dropdown หรือกดลิงก์จากรายการด้านขวา");
        carrierSelect.focus();
        renderLinks();
        return;
      }

      renderLinks();
      if (target.direct === false) {
        navigator.clipboard.writeText(tracking).catch(() => {});
      }

      window.open(buildUrl(target, tracking), "_blank", "noopener,noreferrer");
      showStatus(target.direct === false
        ? `คัดลอกเลข Tracking แล้ว และเปิดหน้า ${target.label}`
        : `เปิดลิงก์ของ ${target.label} แล้ว`, true);
    });

    copyBtn.addEventListener("click", async () => {
      const tracking = cleanTracking(trackingInput.value);
      if (!tracking) {
        showStatus("ยังไม่มีเลข Tracking ให้คัดลอก");
        trackingInput.focus();
        return;
      }

      try {
        await navigator.clipboard.writeText(tracking);
        showStatus("คัดลอกเลข Tracking แล้ว", true);
      } catch {
        trackingInput.select();
        document.execCommand("copy");
        showStatus("คัดลอกเลข Tracking แล้ว", true);
      }
    });

    clearBtn.addEventListener("click", () => {
      trackingInput.value = "";
      carrierSelect.value = "auto";
      showStatus("");
      renderLinks();
      trackingInput.focus();
    });

    trackingInput.addEventListener("input", renderLinks);
    carrierSelect.addEventListener("change", renderLinks);

    populateSelect();
    renderLinks();
  </script>
</body>
</html>
